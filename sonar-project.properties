# SonarCloud identity for the BLB People Distribution Bundle.
#
# CI analysis runs from the composed platform root (see the platform repo's
# .github/workflows/module-ci.yml), which passes sonar.sources, sonar.tests, and
# coverage paths as -D arguments scoped to app/Modules/People. This file records
# the stable project identity so SonarCloud automatic analysis and local IDE
# scanners resolve the same project.
sonar.projectKey=BelimbingApp_blb-people
sonar.organization=belimbingapp
sonar.cpd.exclusions=**/Tests/**,**/Database/Migrations/**,**/Config/**,**/Routes/**
